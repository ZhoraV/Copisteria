<!DOCTYPE html>
<html lang="es">

<head>

    <title>Copy Max - Tu solución en la UPTP</title>
    <style>
        :root {
            --azul-oscuro: #4f9df1;
            --naranja: #ff7f00;
            --blanco: #ffffff;
        }

        body {
            /* Aquí indicas la imagen */
            background-image: url('Fondo Copy Max.png');

            background-size: cover;

            background-attachment: fixed;

            background-position: center;

            background-color: #004a99;

            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: var(--blanco);
            border: 3px solid var(--azul-oscuro);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        header {
            background-color: var(--azul-oscuro);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2em;
        }

        header p {
            margin: 5px 0 0;
            font-weight: bold;
            color: var(--naranja);
        }

        .seccion {
            padding: 20px;
            border-bottom: 2px solid #eee;
        }

        h2 {
            color: var(--azul-oscuro);
            margin-top: 0;
            display: flex;
            align-items: center;
        }

        .lista-servicios {
            list-style: none;
            padding: 0;
        }

        .lista-servicios li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .lista-servicios li::before {
            content: "➔";
            color: var(--naranja);
            position: absolute;
            left: 0;
        }

        .btn-contacto {
            display: block;
            background-color: var(--naranja);
            color: white;
            text-align: center;
            padding: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            transition: 0.3s;
            border-radius: 20px;
        }

        .btn-contacto:hover {
            background-color: #e67300;
        }

        .footer {
            background: #f9f9f9;
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
        }

        .contenedor-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: #0a66c7;
            color: white;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        .texto-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
